<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Q4 Practice 3</title>
</head>
<body>

    <h2>JavaScript For Loop</h2>
        <p id="sample"></p>
        <script>
            let Sample1= "";
            for (let x = 0; x < 3; x++) {
            Sample1 += "The number is " + x + "<br>";
            }
            document.getElementById("sample").innerHTML = Sample1;
        </script>

    <h2>JavaScript While Loop</h2>
        <p id="sample2"></p>
        <script>
            let Sample2= "";
            let y = 0;
            while (y < 5) {
            Sample2 += "<br>The number is " + y;
            y++;
            }
            document.getElementById("sample2").innerHTML = Sample2;
        </script>

    <h2>JavaScript Do-While Loop</h2>
        <p id="sample3"></p>
        <script>
            let Sample3 = "";
            let z = 5;
            do {
            Sample3 += "<br>The number is " + z;
            z--;
            }
            while (z < 0);  
        document.getElementById("sample3").innerHTML = Sample3;
        </script>
    
</body>
</html>
