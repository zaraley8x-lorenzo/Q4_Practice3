<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Q4 Practice 3</title>
</head>
<body>

    <h2>JavaScript For Loop</h2>
        <p id="sample"></p>
        <script>
        let Sample1= "";
        for (let x = 0; x < 3; x++) {
        Sample1 += "The number is " + x + "<br>";
        }
        document.getElementById("sample").innerHTML = Sample1;
        </script>
    
</body>
</html>
